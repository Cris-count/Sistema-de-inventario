# PostgreSQL + API Spring Boot
#
# Desarrollo local (solo BD; API con npm run backend o IDE):
#   docker compose up -d db
#
# Todo el stack (BD + API en contenedor):
#   docker compose up -d --build
#
# Primera vez: Postgres ejecuta database/schema.sql (esquema completo).
# BD ya existente con volumen antiguo: aplicar database/migrations/*.sql manualmente si falta algo.
# Si el backend (JDBC) falla con "password authentication failed" para inventario: el volumen
# puede haberse creado con otras credenciales (POSTGRES_* solo aplican en el primer init). Reset: npm run db:reset
#
# API: http://localhost:8080/swagger-ui.html  |  DB en el host: localhost:5433 → 5432 en el contenedor (evita choque con Postgres local en 5432)
# Correo dev (Mailpit): bandeja web http://localhost:8025 — los «Aprobar y enviar correo» llegan ahí, no a Internet.

services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: inventario-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

  db:
    image: postgres:16-alpine
    container_name: inventario-postgres
    environment:
      POSTGRES_USER: inventario
      POSTGRES_PASSWORD: inventario
      POSTGRES_DB: inventario
    ports:
      - "5433:5432"
    volumes:
      - inventario_pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventario -d inventario"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inventario-api
    ports:
      - "8080:8080"
    environment:
      # Sin SMTP en Docker dev el MailHealthIndicator deja el agregado en DOWN y `npm run up` nunca pasa del healthcheck.
      MANAGEMENT_HEALTH_MAIL_ENABLED: "false"
      # SMTP hacia Mailpit (dev): sí se llama a JavaMailSender; el correo aparece en http://localhost:8025
      SPRING_MAIL_HOST: mailpit
      SPRING_MAIL_PORT: "1025"
      SPRING_MAIL_USERNAME: noreply@inventario.local
      SPRING_MAIL_PASSWORD: ""
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "false"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "false"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED: "false"
      # Producción / Gmail: sustituí las variables anteriores (host real, 587, auth+TLS, usuario/contraseña de aplicación).
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/inventario
      SPRING_DATASOURCE_USERNAME: inventario
      SPRING_DATASOURCE_PASSWORD: inventario
      JWT_SECRET: ${JWT_SECRET:-cambiarEnProduccionMinimo256BitsParaHS256AlgoritmoSeguro!!}
      APP_SEED_ADMIN_EMAIL: ${APP_SEED_ADMIN_EMAIL:-admin@inventario.local}
      APP_SEED_ADMIN_PASSWORD: ${APP_SEED_ADMIN_PASSWORD:-Admin123!}
      APP_SEED_AUX_EMAIL: ${APP_SEED_AUX_EMAIL:-aux@inventario.local}
      APP_SEED_AUX_PASSWORD: ${APP_SEED_AUX_PASSWORD:-AuxBodega123!}
      APP_SEED_COMPRAS_EMAIL: ${APP_SEED_COMPRAS_EMAIL:-compras@inventario.local}
      APP_SEED_COMPRAS_PASSWORD: ${APP_SEED_COMPRAS_PASSWORD:-Compras123!}
      APP_SEED_GERENCIA_EMAIL: ${APP_SEED_GERENCIA_EMAIL:-gerencia@inventario.local}
      APP_SEED_GERENCIA_PASSWORD: ${APP_SEED_GERENCIA_PASSWORD:-Gerencia123!}
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started

volumes:
  inventario_pgdata:
