# Perfil de pruebas: H2 en memoria (compatible con MODE PostgreSQL) sin depender de Docker.
spring:
  datasource:
    url: jdbc:h2:mem:inventario_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      data-locations: classpath:test-seed.sql

# En tests solo se sembrará el admin; el resto de emails vacíos evita cuatro usuarios en H2.
app:
  rate-limit:
    enabled: false
    # Aislar tests de variables de entorno (p. ej. RATE_LIMIT_BACKEND=redis en la máquina local).
    backend: memory
    redis:
      host: ""
  refresh-token:
    expiration-ms: 86400000
    family-absolute-ms: 172800000
    hash-pepper: test-refresh-pepper
    pepper-required: false
    max-active-families-per-user: 0
  jwt:
    secret: ${JWT_SECRET:test-jwt-secret-min-32-bytes-for-h2-tests!!}
    issuer: https://test.inventario.local
    audience: inventario-api-test
    allow-legacy-access-without-empresa-claim: false
  mfa:
    state-store: jpa
  billing:
    api-secret: test-billing-secret-key-for-integration-tests
    post-payment-empresa-estado: ACTIVA
    plan-change-late-confirm-max-hours: 72
  seed:
    empresa-identificacion: TEST-001
    superadmin-email: ""
    superadmin-password: ""
    aux-email: ""
    aux-password: ""
    compras-email: ""
    compras-password: ""
    gerencia-email: ""
    gerencia-password: ""
