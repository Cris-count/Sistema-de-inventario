spring:
  application:
    name: inventario-api
  # Si existe `application-local.yml` en resources (no commitear; ver application-local.yml.example), se fusiona aquí.
  config:
    import: optional:classpath:application-local.yml
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5433/inventario}
    username: ${SPRING_DATASOURCE_USERNAME:inventario}
    password: ${SPRING_DATASOURCE_PASSWORD:inventario}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    # En producción preferir DTOs y open-in-view: false; true evita LazyInitializationException al serializar entidades en controladores.
    open-in-view: true
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC
  # Correo (Gmail u otro SMTP). Sin host no se crea JavaMailSender: simulación y alertas quedan en log.
  # También: producto activo, stock mínimo > 0, proveedor con e-mail (preferido o última entrada COMPRA);
  # envío automático además requiere «Alertas pedido proveedor» en Mi empresa (la simulación no).
  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

app:
  billing:
    # Misma clave para webhook y confirmación manual (sustituir en producción; usar longitud fija para comparación constante).
    api-secret: ${BILLING_API_SECRET:dev-billing-secret-key-32chars!}
    # Tras pago aprobado: ACTIVA | EN_PRUEBA
    post-payment-empresa-estado: ${BILLING_POST_PAYMENT_EMPRESA:ACTIVA}
    # Horas máximas para mantener un cambio de plan en espera de pago antes de expirar automáticamente.
    plan-change-pending-ttl-hours: ${BILLING_PLAN_CHANGE_PENDING_TTL_HOURS:72}
    # Tras expiración automática del cambio (pago RECHAZADO + EXPIRADO_SISTEMA, compra CANCELADA), horas máximas
    # desde pago.createdAt (o compra.createdAt si faltara) para aceptar la confirmación de la pasarela.
    # Por defecto 72 h (3 días), alineado con plan-change-pending-ttl-hours: acota cobros dudosos y deja casos límite a soporte.
    # En producción ajustar con BILLING_PLAN_CHANGE_LATE_CONFIRM_MAX_HOURS según acuerdos con la pasarela y riesgo operativo.
    plan-change-late-confirm-max-hours: ${BILLING_PLAN_CHANGE_LATE_CONFIRM_MAX_HOURS:72}
  onboarding:
    # TRIAL | PENDING_PAYMENT | ACTIVE — define el estado comercial inicial tras POST /onboarding/register-company
    activation-default: ${APP_ONBOARDING_ACTIVATION:TRIAL}
    trial-days: ${APP_ONBOARDING_TRIAL_DAYS:14}
    generate-pin-on-pending-payment: ${APP_ONBOARDING_GENERATE_PIN:true}
  jwt:
    # Obligatorio: definir JWT_SECRET en el entorno (mínimo 32 bytes UTF-8). Sin valor por defecto en código.
    secret: ${JWT_SECRET}
    # Access token corto (15 min por defecto). Para sesiones largas hace falta refresh token (pendiente de implementar; hoy re-login).
    expiration-ms: ${JWT_EXPIRATION_MS:900000}
    issuer: ${JWT_ISSUER:https://inventario.local}
    audience: ${JWT_AUDIENCE:inventario-api}
    # Challenge MFA: entre 60 s y 300 s (5 min máximo aplicado en código)
    mfa-challenge-expiration-ms: ${JWT_MFA_CHALLENGE_MS:300000}
    # true solo durante migración: acepta JWT antiguos sin claim empresaId (desactivar en producción).
    allow-legacy-access-without-empresa-claim: ${JWT_ALLOW_LEGACY_NO_EMPRESA:false}
  refresh-token:
    # TTL de cada token opaco (rotación); acotado por family-absolute-ms (no hay sesión infinita por refrescar).
    expiration-ms: ${REFRESH_TOKEN_EXPIRATION_MS:1209600000}
    # Tope absoluto de la familia desde el primer refresh del login (la rotación NO lo extiende).
    family-absolute-ms: ${REFRESH_TOKEN_FAMILY_ABSOLUTE_MS:2592000000}
    hash-pepper: ${REFRESH_TOKEN_PEPPER:}
    # En producción: true + pepper no vacío (ver RefreshTokenPepperStartupValidator).
    pepper-required: ${REFRESH_TOKEN_PEPPER_REQUIRED:false}
    # 0 = familias ilimitadas por usuario; >0 revoca la familia activa más antigua al crear una nueva.
    max-active-families-per-user: ${REFRESH_TOKEN_MAX_FAMILIES_PER_USER:0}
  rate-limit:
    # memory = JVM (dev/tests). redis = ventana fija compartida (requiere app.rate-limit.redis.host).
    backend: ${RATE_LIMIT_BACKEND:memory}
    # Con backend=redis: ante fallo de Redis, usar memoria por instancia (true) o propagar error (false).
    allow-memory-fallback-on-redis-failure: ${RATE_LIMIT_ALLOW_MEMORY_FALLBACK:true}
    redis:
      host: ${RATE_LIMIT_REDIS_HOST:}
      port: ${RATE_LIMIT_REDIS_PORT:6379}
      password: ${RATE_LIMIT_REDIS_PASSWORD:}
      database: ${RATE_LIMIT_REDIS_DATABASE:0}
      command-timeout: ${RATE_LIMIT_REDIS_COMMAND_TIMEOUT_MS:800ms}
    enabled: ${RATE_LIMIT_ENABLED:true}
    trust-x-forwarded-for: ${RATE_LIMIT_TRUST_XFF:false}
    hash-pepper: ${RATE_LIMIT_PEPPER:}
    login:
      max-per-ip-per-window: ${RATE_LIMIT_LOGIN_MAX_IP:30}
      max-per-email-per-window: ${RATE_LIMIT_LOGIN_MAX_EMAIL:15}
      window-seconds: ${RATE_LIMIT_LOGIN_WINDOW_SEC:60}
    mfa-verify:
      max-per-ip-per-window: ${RATE_LIMIT_MFA_MAX_IP:40}
      max-per-challenge-per-window: ${RATE_LIMIT_MFA_MAX_CHALLENGE:25}
      window-seconds: ${RATE_LIMIT_MFA_WINDOW_SEC:60}
    onboarding:
      max-per-ip-per-window: ${RATE_LIMIT_ONBOARD_IP:10}
      max-per-email-per-window: ${RATE_LIMIT_ONBOARD_EMAIL:8}
      window-seconds: ${RATE_LIMIT_ONBOARD_WINDOW_SEC:3600}
    billing:
      ip-limited: ${RATE_LIMIT_BILLING_IP:false}
      max-per-ip-per-window: ${RATE_LIMIT_BILLING_MAX_IP:120}
      window-seconds: ${RATE_LIMIT_BILLING_WINDOW_SEC:60}
    auth-refresh:
      max-per-ip-per-window: ${RATE_LIMIT_REFRESH_IP:45}
      max-per-token-fingerprint-per-window: ${RATE_LIMIT_REFRESH_TOKEN_FP:30}
      window-seconds: ${RATE_LIMIT_REFRESH_WINDOW_SEC:60}
    auth-logout:
      max-per-ip-per-window: ${RATE_LIMIT_LOGOUT_IP:60}
      max-per-token-fingerprint-per-window: ${RATE_LIMIT_LOGOUT_TOKEN_FP:40}
      window-seconds: ${RATE_LIMIT_LOGOUT_WINDOW_SEC:60}
  mfa:
    issuer: ${MFA_ISSUER:Inventario}
    max-challenge-attempts: ${MFA_MAX_ATTEMPTS:5}
    # jpa (por defecto, seguro en cluster) | memory (solo una réplica / desarrollo)
    state-store: ${MFA_STATE_STORE:jpa}
    challenge-state-ttl-minutes: ${MFA_CHALLENGE_STATE_TTL_MINUTES:10}
    challenge-state-cleanup-ms: ${MFA_CHALLENGE_CLEANUP_MS:300000}
    backup-code-count: ${MFA_BACKUP_CODE_COUNT:10}
  seed:
    empresa-identificacion: ${APP_SEED_EMPRESA_IDENT:DEV-DEFAULT-001}
    admin-email: ${APP_SEED_ADMIN_EMAIL:admin@inventario.local}
    admin-password: ${APP_SEED_ADMIN_PASSWORD:Admin123!}
    superadmin-email: ${APP_SEED_SUPERADMIN_EMAIL:superadmin@inventario.local}
    superadmin-password: ${APP_SEED_SUPERADMIN_PASSWORD:SuperAdmin123!}
    aux-email: ${APP_SEED_AUX_EMAIL:aux@inventario.local}
    aux-password: ${APP_SEED_AUX_PASSWORD:AuxBodega123!}
    compras-email: ${APP_SEED_COMPRAS_EMAIL:compras@inventario.local}
    compras-password: ${APP_SEED_COMPRAS_PASSWORD:Compras123!}
    gerencia-email: ${APP_SEED_GERENCIA_EMAIL:gerencia@inventario.local}
    gerencia-password: ${APP_SEED_GERENCIA_PASSWORD:Gerencia123!}
  inventory:
    stock-alerts:
      # true: intenta envío SMTP cuando exista bean JavaMailSender (requiere spring.mail.host + credenciales).
      # false: solo registra en log (útil en dev o si no hay servidor de correo). Variable: APP_INVENTORY_STOCK_ALERTS_SEND_EMAIL
      send-email: ${APP_INVENTORY_STOCK_ALERTS_SEND_EMAIL:true}
      cooldown-hours: ${APP_INVENTORY_STOCK_ALERTS_COOLDOWN_HOURS:24}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
      status:
        # DEGRADED / MISCONFIGURED (rate limiting) entre UNKNOWN y UP para no tumbar el agregado como DOWN.
        order: DOWN,OUT_OF_SERVICE,UNKNOWN,MISCONFIGURED,DEGRADED,UP

logging:
  level:
    org.hibernate.SQL: WARN
    com.inventario: INFO
    AUTH_AUDIT: INFO
